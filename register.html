<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
  authDomain: "agentx-27ea9.firebaseapp.com",
  projectId: "agentx-27ea9",
  storageBucket: "agentx-27ea9.firebasestorage.app",
  messagingSenderId: "244685077463",
  appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async () => {
  const email = emailInput.value.trim();
  const pass  = passInput.value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("تم إنشاء الحساب ✅");
    window.location.href = "index.html";
  } catch(e) {
    alert(e.message);
  }
};
</script>

<style>
body{background:#090910;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#111;padding:25px;border-radius:20px;width:320px}
input,button{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none}
button{background:#534AB7;color:#fff}
</style>
</head>

<body>

<div class="card">
<h2>Register</h2>

<input id="emailInput" placeholder="Email"/>
<input id="passInput" type="password" placeholder="Password"/>

<button onclick="register()">إنشاء الحساب</button>

<p style="text-align:center;margin-top:15px">
عندك حساب؟ <a href="index.html">تسجيل الدخول</a>
</p>
</div>

</body>
</html>
