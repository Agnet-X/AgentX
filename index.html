<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentX — الرئيسية</title>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
      authDomain: "agentx-27ea9.firebaseapp.com",
      projectId: "agentx-27ea9",
      storageBucket: "agentx-27ea9.firebasestorage.app",
      messagingSenderId: "244685077463",
      appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // التحقق من الهوية فوراً
    onAuthStateChanged(auth, user => {
      if (!user) {
        // لو مش مسجل، يرجع لصفحة اللوجن (تأكد إن اسمها login.html)
        window.location.replace('login.html');
      } else {
        // لو مسجل، اظهر محتوى الصفحة
        document.body.style.opacity = "1";
        console.log("Welcome:", user.email);
      }
    });
  </script>

  <style>
    /* بنخفي الصفحة لحظياً لحد ما Firebase يتأكد من اليوزر عشان نمنع الـ Flash */
    body { opacity: 0; transition: opacity 0.5s; background: #090910; color: white; }
  </style>
</head>
<body>
  <h1>مرحباً بك في AgentX.Ai</h1>
  <p>تم تسجيل الدخول بنجاح.</p>
</body>
</html>
