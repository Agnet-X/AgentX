<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgentX — تسجيل الدخول</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
  authDomain: "agentx-27ea9.firebaseapp.com",
  projectId: "agentx-27ea9",
  storageBucket: "agentx-27ea9.firebasestorage.app",
  messagingSenderId: "244685077463",
  appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, user => {
  if (user) window.location.href = "index.html";
});

window.__emailLogin = (email, pass) =>
  signInWithEmailAndPassword(auth, email, pass);

window.__register = (email, pass) =>
  createUserWithEmailAndPassword(auth, email, pass);

window.__googleLogin = () =>
  signInWithPopup(auth, provider);
</script>

<style>
body {
  font-family: sans-serif;
  background: #090910;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}
button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  background: #534AB7;
  color: white;
  cursor: pointer;
}
a {
  color: #7F77DD;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
<h3>Login</h3>

<input id="emailInput" type="email" placeholder="البريد الإلكتروني">
<input id="passInput" type="password" placeholder="كلمة المرور">

<button onclick="handleLogin()">تسجيل الدخول</button>
<button onclick="handleGoogle()">Google</button>

<p>ليس لديك حساب؟ <a onclick="handleRegister()">إنشاء حساب</a></p>
</div>

<script>
function show(msg){ alert(msg); }

async function handleLogin() {
  const email = emailInput.value.trim();
  const pass = passInput.value;

  if (!email || !pass) return show("اكتب البيانات");

  try {
    await window.__emailLogin(email, pass);
  } catch(e) {
    show(e.message);
  }
}

async function handleRegister() {
  const email = emailInput.value.trim();
  const pass = passInput.value;

  if (!email || !pass) return show("اكتب البيانات");

  try {
    await window.__register(email, pass);
    show("تم إنشاء الحساب ✅");
  } catch(e) {
    show(e.message);
  }
}

async function handleGoogle() {
  try {
    await window.__googleLogin();
  } catch(e) {
    show(e.message);
  }
}
</script>

</body>
</html>
