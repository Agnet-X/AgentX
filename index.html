<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentX — تسجيل الدخول</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'index.html';
    });

    window.__emailLogin = (email, pass) =>
      signInWithEmailAndPassword(auth, email, pass);

    window.__googleLogin = () =>
      signInWithPopup(auth, provider);
  </script>

  <style>
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background:#090910;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .card {
      width:100%;
      max-width:360px;
      background:#111;
      padding:25px;
      border-radius:20px;
    }
    input {
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border-radius:10px;
      border:none;
      background:#1b1b2b;
      color:#fff;
    }
    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      margin-top:5px;
    }
    .primary {
      background:#534AB7;
      color:#fff;
    }
    .social {
      background:#222;
      color:#fff;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2 style="text-align:center;">AgentX</h2>

  <input type="email" id="emailInput" placeholder="البريد الإلكتروني"/>
  <input type="password" id="passInput" placeholder="كلمة المرور"/>

  <button class="primary" id="loginBtn" onclick="handleEmailLogin()" disabled>
    تسجيل الدخول
  </button>

  <button class="social" onclick="handleGoogleLogin()">
    المتابعة بـ Google
  </button>
</div>

<script>
  function show(msg){ alert(msg); }

  function translateError(code) {
    const map = {
      'auth/user-not-found': 'البريد غير مسجل',
      'auth/wrong-password': 'كلمة المرور غلط',
      'auth/invalid-email': 'إيميل غير صحيح'
    };
    return map[code] || 'حصل خطأ';
  }

  async function handleEmailLogin() {
    const email = emailInput.value.trim();
    const pass  = passInput.value;

    try {
      await window.__emailLogin(email, pass);
    } catch(e) {
      show(translateError(e.code));
    }
  }

  async function handleGoogleLogin() {
    try {
      await window.__googleLogin();
    } catch(e) {
      show('خطأ في تسجيل Google');
    }
  }

  // UX تحسين
  emailInput.addEventListener('input', check);
  passInput.addEventListener('input', check);

  function check() {
    loginBtn.disabled = !(emailInput.value && passInput.value);
  }
</script>

</body>
</html>
