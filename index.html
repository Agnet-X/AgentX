<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  RecaptchaVerifier,
  signInWithPhoneNumber,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 Firebase Config (بتاعك)
const firebaseConfig = {
  apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
  authDomain: "agentx-27ea9.firebaseapp.com",
  projectId: "agentx-27ea9",
  storageBucket: "agentx-27ea9.firebasestorage.app",
  messagingSenderId: "244685077463",
  appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// لو المستخدم مسجل دخول
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'index.html';
});

// ✅ تسجيل دخول
window.__emailLogin = (email, pass) =>
  signInWithEmailAndPassword(auth, email, pass);

// ✅ إنشاء حساب
window.__register = (email, pass) =>
  createUserWithEmailAndPassword(auth, email, pass);

// ✅ Google
window.__googleLogin = () => signInWithPopup(auth, provider);

// ✅ OTP
window.__sendOTP = async (phone) => {
  if (!window._recaptcha) {
    window._recaptcha = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'invisible'
    });
    await window._recaptcha.render();
  }
  window._confirmResult = await signInWithPhoneNumber(auth, phone, window._recaptcha);
};

window.__verifyOTP = (code) =>
  window._confirmResult.confirm(code);

</script>
