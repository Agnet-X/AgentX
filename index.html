<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>AgentX — الرئيسية</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
      authDomain: "agentx-27ea9.firebaseapp.com",
      projectId: "agentx-27ea9",
      storageBucket: "agentx-27ea9.firebasestorage.app",
      messagingSenderId: "244685077463",
      appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // التحقق من الهوية: لو مش مسجل، اطرده لصفحة اللوجن
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.replace('login.html');
      } else {
        document.getElementById('userMail').textContent = user.email;
        document.body.style.display = 'block'; // اظهر الصفحة بس لما نتأكد إنه مسجل
      }
    });

    window.logout = () => signOut(auth);
  </script>
  <style>
    body { background: #090910; color: white; font-family: sans-serif; display:none; text-align:center; padding-top: 50px; }
    button { padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>أهلاً بك في AgentX</h1>
  <p>مسجل دخول بـ: <span id="userMail"></span></p>
  <button onclick="logout()">تسجيل خروج</button>
</body>
</html>
