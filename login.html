<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentX — الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
      authDomain: "agentx-27ea9.firebaseapp.com",
      projectId: "agentx-27ea9",
      storageBucket: "agentx-27ea9.firebasestorage.app",
      messagingSenderId: "244685077463",
      appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // أهم جزء: لو المستخدم مسجل دخول "فعلاً" حوله لـ index وشكراً
    onAuthStateChanged(auth, user => {
      if (user) {
        window.location.replace('index.html');
      }
    });

    // تعريف الدوال في الـ window عشان الـ HTML يشوفها
    window.handleAuth = async (e) => {
      if(e) e.preventDefault(); 
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const btn = document.getElementById('mainBtn');

      if (!email || !pass) { showSnack('اكتب البيانات الأول'); return; }
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        if (window.isRegisterMode) {
          await createUserWithEmailAndPassword(auth, email, pass);
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
        // التحويل هيحصل تلقائياً عن طريق onAuthStateChanged
      } catch (error) {
        console.error(error);
        showSnack('خطأ: تأكد من البيانات');
        btn.disabled = false;
        btn.textContent = window.isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
      }
    };

    window.handleGoogle = async () => {
      try { await signInWithPopup(auth, provider); }
      catch (e) { showSnack('فشل تسجيل جوجل'); }
    };
  </script>

  <style>
    :root { --bg: #090910; --bg2: #0f0f18; --purple: #534AB7; --text: #f0f0f0; --border: rgba(83,74,183,0.25); }
    body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
    .logo-title { font-family: 'Space Grotesk'; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 20px; }
    input { width: 100%; padding: 13px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; text-align: right; outline: none; }
    .btn-primary { width: 100%; padding: 13px; background: var(--purple); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-social { width: 100%; padding: 11px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #ccc; cursor: pointer; margin-top: 10px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #snack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #534AB7; padding: 10px 20px; border-radius: 10px; display: none; }
    .toggle { font-size: 0.8rem; color: #888; margin-top: 15px; cursor: pointer; }
    .toggle span { color: var(--purple); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-title">AGENTX</div>
  <form onsubmit="handleAuth(event)">
    <input type="email" id="emailInput" placeholder="البريد الإلكتروني" required>
    <input type="password" id="passInput" placeholder="كلمة المرور" required>
    <button type="submit" class="btn-primary" id="mainBtn">تسجيل الدخول</button>
  </form>
  
  <button class="btn-social" onclick="handleGoogle()">المتابعة بـ Google</button>
  <div class="toggle" onclick="switchMode()"><span id="toggleTxt">ليس لديك حساب؟ إنشاء حساب</span></div>
</div>

<div id="snack"></div>

<script>
  window.isRegisterMode = false;
  function switchMode() {
    window.isRegisterMode = !window.isRegisterMode;
    document.getElementById('mainBtn').textContent = window.isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
    document.getElementById('toggleTxt').textContent = window.isRegisterMode ? 'لديك حساب؟ سجل دخول' : 'ليس لديك حساب؟ إنشاء حساب';
  }
  function showSnack(m) {
    const s = document.getElementById('snack');
    s.textContent = m; s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 3000);
  }
</script>
</body>
</html>
