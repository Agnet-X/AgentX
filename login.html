<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentX — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // البيانات دي هي اللي كانت ناقصة في الـ Console عندك
    const firebaseConfig = {
      apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
      authDomain: "agentx-27ea9.firebaseapp.com",
      projectId: "agentx-27ea9",
      storageBucket: "agentx-27ea9.firebasestorage.app",
      messagingSenderId: "244685077463",
      appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // منع الرفرش اللانهائي والتحويل التلقائي
    onAuthStateChanged(auth, user => {
      if (user && !window.location.pathname.includes('index.html')) {
        window.location.replace('index.html');
      }
    });

    window.handleAuth = async () => {
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const btn = document.getElementById('mainBtn');

      if (!email || !pass) { showSnack('اكتب البيانات الأول'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        if (window.isRegisterMode) {
          await createUserWithEmailAndPassword(auth, email, pass);
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
      } catch (e) {
        console.error(e);
        showSnack('فشل الإجراء، تحقق من البيانات');
        btn.disabled = false;
        btn.textContent = window.isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
      }
    };

    window.handleGoogle = () => signInWithPopup(auth, provider);
  </script>

  <style>
    :root {
      --bg: #090910; --bg2: #0f0f18; --purple: #534AB7; --purpleL: #7F77DD;
      --border: rgba(83,74,183,0.25); --text: #f0f0f0; --muted: rgba(255,255,255,0.35);
    }
    body { font-family: 'IBM Plex Sans Arabic'; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; }
    .orb { position: fixed; border-radius: 50%; filter: blur(60px); pointer-events: none; }
    .orb-1 { width: 300px; height: 300px; background: rgba(83,74,183,0.2); top: -100px; right: -50px; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 32px; width: 380px; text-align: center; z-index: 10; }
    .logo-title { font-family: 'Space Grotesk'; font-size: 1.5rem; letter-spacing: 3px; margin-top: 10px; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; text-align: center; outline: none; }
    .btn-main { width: 100%; padding: 13px; background: var(--purple); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-social { width: 100%; padding: 11px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #ccc; margin-top: 10px; cursor: pointer; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #snack { position: fixed; bottom: 20px; background: var(--purple); padding: 10px 20px; border-radius: 10px; display: none; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="card">
    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/></svg>
    <div class="logo-title">WELCOME</div>
    <div style="color:var(--purple); font-size: 0.8rem; margin-bottom: 20px;">AgentX.Ai</div>
    
    <input type="email" id="emailInput" placeholder="البريد الإلكتروني">
    <input type="password" id="passInput" placeholder="كلمة المرور">
    <button class="btn-main" id="mainBtn" onclick="handleAuth()">تسجيل الدخول</button>
    <button class="btn-social" onclick="handleGoogle()">Google دخول بـ</button>

    <div style="margin-top:20px; font-size:0.8rem; color:#666; cursor:pointer;" onclick="switchMode()">
      <span id="toggleMode">ليس لديك حساب؟ إنشاء حساب</span>
    </div>
  </div>
  <div id="snack"></div>

  <script>
    window.isRegisterMode = false;
    function switchMode() {
      window.isRegisterMode = !window.isRegisterMode;
      document.getElementById('mainBtn').textContent = window.isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
      document.getElementById('toggleMode').textContent = window.isRegisterMode ? 'لديك حساب؟ سجل دخول' : 'ليس لديك حساب؟ إنشاء حساب';
    }
    function showSnack(m) {
      const s = document.getElementById('snack');
      s.textContent = m; s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
