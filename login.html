<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentX — الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
      authDomain: "agentx-27ea9.firebaseapp.com",
      projectId: "agentx-27ea9",
      storageBucket: "agentx-27ea9.firebasestorage.app",
      messagingSenderId: "244685077463",
      appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // مراقب حالة الدخول
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // التحويل باستخدام replace لمنع العودة للخلف والرفرش اللانهائي
        window.location.replace('index.html');
      }
    });

    window.handleAuth = async (e) => {
      if(e) e.preventDefault(); // السطر ده هو اللي هيمنع الريفرش اللحظي
      
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const btn = document.getElementById('mainBtn');

      if (!email || !pass) { alert('اكتب البيانات الأول'); return; }
      
      btn.disabled = true;
      btn.textContent = 'جاري التحقق...';

      try {
        if (window.isRegisterMode) {
          await createUserWithEmailAndPassword(auth, email, pass);
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
      } catch (error) {
        console.error("Firebase Error:", error.code);
        alert('خطأ: ' + error.message);
        btn.disabled = false;
        btn.textContent = window.isRegisterMode ? 'إنشاء حساب' : 'دخول';
      }
    };

    window.handleGoogle = async () => {
      try { await signInWithPopup(auth, provider); }
      catch (e) { console.error(e); }
    };
  </script>

  <style>
    :root { --bg: #090910; --purple: #534AB7; --text: #f0f0f0; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Arabic', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #0f0f18; border: 1px solid rgba(83,74,183,0.3); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; color: white; outline: none; text-align: center; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; margin-top: 10px; }
    .btn-main { background: var(--purple); color: white; }
    .btn-google { background: #fff; color: #000; }
    .toggle { font-size: 13px; margin-top: 15px; color: #888; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
  <h2 style="font-family:'Space Grotesk'">AgentX</h2>
  <form onsubmit="handleAuth(event)"> <input type="email" id="emailInput" placeholder="الايميل" required>
    <input type="password" id="passInput" placeholder="الباسورد" required>
    <button type="submit" class="btn-main" id="mainBtn">دخول</button>
  </form>
  
  <button class="btn-google" onclick="handleGoogle()">Google دخول بـ</button>
  <div class="toggle" id="toggleMode" onclick="switchMode()">ليس لديك حساب؟ إنشاء حساب</div>
</div>

<script>
  window.isRegisterMode = false;
  function switchMode() {
    window.isRegisterMode = !window.isRegisterMode;
    document.getElementById('mainBtn').textContent = window.isRegisterMode ? 'إنشاء حساب' : 'دخول';
    document.getElementById('toggleMode').textContent = window.isRegisterMode ? 'لديك حساب؟ سجل دخول' : 'ليس لديك حساب؟ إنشاء حساب';
  }
</script>

</body>
</html>
