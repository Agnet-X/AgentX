<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentX — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMbrB0R0Om0t2kryg4SDhAHoaNSBvFnpc",
      authDomain: "agentx-27ea9.firebaseapp.com",
      projectId: "agentx-27ea9",
      storageBucket: "agentx-27ea9.firebasestorage.app",
      messagingSenderId: "244685077463",
      appId: "1:244685077463:web:affd6ce25ea0bdbd1a2992"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // منع الرفرش اللانهائي: بنحول بس لو المستخدم مش في صفحة الـ index فعلياً
    onAuthStateChanged(auth, user => {
      if (user && !window.location.pathname.includes('index.html')) {
        window.location.replace('index.html');
      }
    });

    window.handleAuth = async (e) => {
      if(e) e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const btn = document.getElementById('mainBtn');

      if (!email || !pass) { showSnack('اكتب بياناتك يا بطل'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        if (window.isRegisterMode) {
          await createUserWithEmailAndPassword(auth, email, pass);
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
      } catch (error) {
        showSnack('فيه مشكلة في البيانات، راجعها تاني');
        btn.disabled = false;
        btn.textContent = window.isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
      }
    };

    window.handleGoogle = () => signInWithPopup(auth, provider);
  </script>

  <style>
    /* رجعنا الألوان بتاعتك بالظبط */
    :root { --bg: #090910; --purple: #534AB7; --text: #f0f0f0; --border: rgba(83,74,183,0.3); }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Arabic', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
    
    .card { 
      background: #0f0f18; border: 1px solid var(--border); border-radius: 24px; 
      padding: 35px; width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: cardIn 0.8s ease-out;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .logo-wrap { margin-bottom: 25px; }
    .bolt { font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--purple)); }
    .logo-title { font-family: 'Space Grotesk'; font-size: 1.6rem; letter-spacing: 3px; font-weight: 700; }
    .logo-sub { font-size: 0.8rem; color: var(--purple); letter-spacing: 2px; }

    input { 
      width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05); 
      border: 1px solid var(--border); border-radius: 12px; color: white; text-align: center; outline: none; 
    }
    .btn-main { width: 100%; padding: 14px; background: var(--purple); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 15px; }
    .btn-google { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; color: #ccc; margin-top: 10px; cursor: pointer; }
    
    .toggle { margin-top: 20px; font-size: 0.85rem; color: #666; cursor: pointer; }
    .toggle span { color: var(--purple); }
    #snack { position: fixed; bottom: 20px; background: var(--purple); padding: 12px 25px; border-radius: 10px; display: none; animation: slideUp 0.3s; }
    @keyframes slideUp { from { transform: translateY(50px); } to { transform: translateY(0); } }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="bolt">⚡</div>
    <div class="logo-title">WELCOME</div>
    <div class="logo-sub">AgentX.Ai</div>
  </div>

  <form onsubmit="handleAuth(event)">
    <input type="email" id="emailInput" placeholder="البريد الإلكتروني" required>
    <input type="password" id="passInput" placeholder="كلمة المرور" required>
    <button type="submit" class="btn-main" id="mainBtn">تسجيل الدخول</button>
  </form>

  <button class="btn-google" onclick="handleGoogle()">المتابعة بـ Google</button>
  <div class="toggle" onclick="switchMode()"><span id="modeTxt">ليس لديك حساب؟ إنشاء حساب</span></div>
</div>

<div id="snack"></div>

<script>
  window.isRegisterMode = false;
  function switchMode() {
    window.isRegisterMode = !window.isRegisterMode;
    document.getElementById('mainBtn').textContent = window.isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
    document.getElementById('modeTxt').textContent = window.isRegisterMode ? 'لديك حساب بالفعل؟ سجل دخول' : 'ليس لديك حساب؟ إنشاء حساب';
  }
  function showSnack(m) {
    const s = document.getElementById('snack');
    s.textContent = m; s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 3000);
  }
</script>
</body>
</html>
